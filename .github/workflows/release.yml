name: Release

# Push a tag like v2.0.1 to package the patch (.zip) + bundle the installer (.exe)
# and publish a GitHub release. Release notes come from release-notes/<tag>.md.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full, with tags)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Sync Version.txt to tag
        run: |
          VER="${GITHUB_REF_NAME#v}"
          VFILE="src/BepInEx/Translation/th/Text/Version.txt"
          # replace the "Re:TH <anything up to the next \n>" text with the tag version
          sed -i -E "s/(Re:TH )[^\\]*/\1v${VER}/" "$VFILE"
          echo "----- Version.txt -----"; cat "$VFILE"

      - name: Package patch -> Patch.TH.V<ver>.zip
        run: |
          VER="${GITHUB_REF_NAME#v}"
          ( cd src && zip -r -q "../Patch.TH.V${VER}.zip" BepInEx dotnet changelog.txt doorstop_config.ini dxgi.dll .doorstop_version )
          ls -lh Patch.TH.V*.zip

      - name: Fetch installer .exe (latest from HetCreep/PriconneReALLTL-Installer)
        run: |
          # Grab the portable standalone .exe — exclude the NSIS "-Setup.exe" and the .sbom.spdx.json
          URL=$(curl -s https://api.github.com/repos/HetCreep/PriconneReALLTL-Installer/releases/latest \
                | grep -o '"browser_download_url": *"[^"]*\.exe"' \
                | grep -v -- '-Setup\.exe' | head -1 \
                | sed 's/.*"\(https[^"]*\)"/\1/')
          echo "installer url: $URL"
          if [ -n "$URL" ]; then
            curl -L -o "PriconneTH-Installer.exe" "$URL"
            ls -lh PriconneTH-Installer.exe
          else
            echo "WARNING: no installer .exe found in HetCreep/PriconneReALLTL-Installer latest release"
          fi

      - name: Build release notes
        run: |
          VER="${GITHUB_REF_NAME#v}"
          if [ -f "release-notes/${GITHUB_REF_NAME}.md" ]; then
            cp "release-notes/${GITHUB_REF_NAME}.md" RELEASE_BODY.md
          else
            # no notes file -> clean Thai placeholder + compare link (NOT a raw English commit-dump).
            # Detailed per-version notes come from release-notes/<tag>.md — write it before tagging.
            echo "::warning::release-notes/${GITHUB_REF_NAME}.md missing — using generic Thai body. Write the notes file + re-run / PATCH the release."
            PREV=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
            {
              echo "V${VER}"
              echo "Changelog"
              echo ""
              echo "• อัปเดตคำแปลและการแก้ไขต่าง ๆ"
              if [ -n "$PREV" ]; then
                echo ""
                echo "Full Changelog: [${PREV}...${GITHUB_REF_NAME}](https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${GITHUB_REF_NAME})"
              fi
            } > RELEASE_BODY.md
          fi
          echo "----- release body -----"; cat RELEASE_BODY.md

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          name: "PriconneTH ${{ github.ref_name }}"
          body_path: RELEASE_BODY.md
          files: |
            Patch.TH.V*.zip
            PriconneTH-Installer.exe

      # NOTE: Version.txt (default-branch display) + CHANGELOG.md are synced by a
      # separate workflow — .github/workflows/version-sync.yml — on the same tag.
