name: Update badges

# Refresh self-hosted shields "endpoint" badge JSON daily.
# These badges render from .github/badges/*.json (generated here), NOT from
# shields' github/* token pool, so they never hit the chronic
# "Unable to select next GitHub token from pool" error.

on:
  schedule:
    - cron: '17 0 * * *' # daily, 00:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate badge data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: node .github/scripts/gen-badges.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges
          if git diff --staged --quiet; then
            echo "No badge changes"
          else
            git commit -m "chore: refresh badge data [skip ci]"
            git push
          fi
